<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Plant Tower Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #2d5a27;
    --green-mid: #4a8c3f;
    --green-light: #7bc67a;
    --green-pale: #d4edda;
    --earth: #8b5e3c;
    --cream: #fdf8f0;
    --warm-white: #fffef9;
    --text-dark: #1e3a1a;
    --text-mid: #4a6741;
    --shadow: rgba(45,90,39,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    touch-action: manipulation;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(122,198,122,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139,94,60,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .screen { display: none; position: relative; z-index: 1; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ══ GRID SCREEN ══ */
  .grid-header {
    background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .grid-header::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 0; right: 0;
    height: 28px;
    background: var(--cream);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  .tower-icon { font-size: 3rem; margin-bottom: 6px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }

  .grid-header h1 {
    font-family: 'Fredoka One', cursive;
    color: white;
    font-size: 2rem;
    text-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .grid-header p {
    color: rgba(255,255,255,0.85);
    font-size: 1rem;
    font-weight: 700;
    margin-top: 6px;
  }

  .tile-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    padding: 36px 18px 28px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  .tile {
    aspect-ratio: 1;
    border-radius: 22px;
    background: white;
    border: 3px solid var(--green-pale);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    box-shadow: 0 3px 10px var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.6) 0%, transparent 60%);
    border-radius: 19px;
    pointer-events: none;
  }

  .tile:active  { transform: scale(0.91); box-shadow: 0 1px 4px var(--shadow); }
  .tile:hover   { border-color: var(--green-light); box-shadow: 0 8px 20px var(--shadow); transform: translateY(-3px); }

  .tile .tile-emoji { font-size: 2.4rem; line-height: 1; }

  /* green sprout badge = has visit history */
  .tile.has-history::after {
    content: '🌱';
    position: absolute;
    top: 4px; right: 5px;
    font-size: 0.75rem;
  }

  /* ══ CHAT SCREEN ══ */
  #screen-chat { background: var(--warm-white); }

  .chat-header {
    background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
    padding: 18px 16px 30px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
  }

  .chat-header::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 0; right: 0;
    height: 28px;
    background: var(--warm-white);
    border-radius: 50% 50% 0 0 / 100% 100% 0 0;
  }

  .back-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .back-btn:active { background: rgba(255,255,255,0.35); }

  .chat-icon-display {
    font-size: 2.4rem;
    line-height: 1;
    flex-shrink: 0;
  }

  .chat-header-text { flex: 1; }

  .chat-header-title {
    font-family: 'Fredoka One', cursive;
    color: white;
    font-size: 1.3rem;
    line-height: 1;
  }

  .chat-header-sub {
    color: rgba(255,255,255,0.8);
    font-size: 0.82rem;
    font-weight: 700;
    margin-top: 3px;
  }

  .plant-selector {
    display: flex;
    gap: 8px;
    padding: 30px 16px 0;
    max-width: 500px;
    margin: 0 auto;
    width: 100%;
  }

  .plant-btn {
    flex: 1;
    padding: 9px 4px;
    border-radius: 14px;
    border: 2.5px solid var(--green-pale);
    background: white;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 800;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .plant-btn.active {
    background: var(--green-deep);
    border-color: var(--green-deep);
    color: white;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    -webkit-overflow-scrolling: touch;
  }

  .msg {
    max-width: 84%;
    padding: 13px 17px;
    border-radius: 20px;
    font-size: 1.02rem;
    line-height: 1.55;
    font-weight: 600;
    animation: msgIn 0.22s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(7px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.companion {
    background: white;
    border: 2px solid var(--green-pale);
    color: var(--text-dark);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .msg.companion .msg-label {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--green-mid);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }

  .msg.child {
    background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(74,140,63,0.3);
  }

  .msg.history-note {
    background: linear-gradient(135deg, #fff8e7, #fef3cc);
    border: 2px solid #f0d060;
    color: #7a5a00;
    align-self: center;
    text-align: center;
    font-size: 0.85rem;
    max-width: 92%;
    border-radius: 14px;
  }

  .typing-indicator {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 16px;
    background: white;
    border: 2px solid var(--green-pale);
    border-radius: 20px;
    border-bottom-left-radius: 4px;
    max-width: 80px;
    align-self: flex-start;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .typing-indicator span {
    width: 8px; height: 8px;
    background: var(--green-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%            { transform: translateY(-6px); }
  }

  .chat-input-area {
    padding: 12px 16px 22px;
    background: white;
    border-top: 2px solid var(--green-pale);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .mic-btn {
    background: linear-gradient(135deg, #e8f5e9, var(--green-pale));
    border: 2.5px solid var(--green-light);
    border-radius: 16px;
    padding: 13px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    color: var(--green-deep);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    transition: background 0.15s;
    width: 100%;
  }

  .mic-btn:active { background: var(--green-pale); }

  .mic-btn.listening {
    background: linear-gradient(135deg, #ffebee, #fce4ec);
    border-color: #e57373;
    color: #c62828;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(229,115,115,0.4); }
    50%       { box-shadow: 0 0 0 10px rgba(229,115,115,0); }
  }

  .input-row { display: flex; gap: 10px; align-items: flex-end; }

  .text-input {
    flex: 1;
    border: 2.5px solid var(--green-pale);
    border-radius: 22px;
    padding: 12px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--text-dark);
    background: var(--cream);
    outline: none;
    resize: none;
    min-height: 50px;
    max-height: 100px;
    transition: border-color 0.15s;
    line-height: 1.4;
  }
  .text-input:focus { border-color: var(--green-mid); }

  .send-btn {
    background: linear-gradient(135deg, var(--green-mid), var(--green-deep));
    border: none; border-radius: 50%;
    width: 50px; height: 50px;
    color: white; font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(74,140,63,0.4);
    transition: transform 0.15s;
  }
  .send-btn:active { transform: scale(0.91); }

  /* STATUS PILL */
  .status-pill {
    position: fixed;
    top: 12px; right: 12px;
    background: rgba(45,90,39,0.9);
    color: white;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 0.72rem;
    font-weight: 800;
    z-index: 100;
    display: flex; align-items: center; gap: 6px;
    backdrop-filter: blur(4px);
    transition: all 0.3s;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); }
  .status-pill.saving .status-dot { background: #ffd54f; animation: pulse 1s infinite; }
  .status-pill.saved  .status-dot { background: #69f0ae; }
  .status-pill.error  .status-dot { background: #ef5350; }

  /* LISTENING OVERLAY */
  .listening-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,90,39,0.96);
    z-index: 200;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 26px;
  }
  .listening-overlay.active { display: flex; }

  .listening-icon { font-size: 4rem; }

  .wave-container { display: flex; gap: 7px; align-items: center; height: 64px; }

  .wave-bar {
    width: 9px; background: var(--green-light);
    border-radius: 5px;
    animation: wave 0.8s ease-in-out infinite;
    height: 22px;
  }
  .wave-bar:nth-child(1){animation-delay:0s}
  .wave-bar:nth-child(2){animation-delay:0.1s}
  .wave-bar:nth-child(3){animation-delay:0.2s}
  .wave-bar:nth-child(4){animation-delay:0.3s}
  .wave-bar:nth-child(5){animation-delay:0.4s}
  .wave-bar:nth-child(6){animation-delay:0.3s}
  .wave-bar:nth-child(7){animation-delay:0.2s}

  @keyframes wave {
    0%,100%{ height: 22px; }
    50%    { height: 58px; }
  }

  .listening-label { color: rgba(255,255,255,0.85); font-size: 1.2rem; font-weight: 700; }

  .cancel-listening {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.4);
    color: white; border-radius: 22px;
    padding: 11px 32px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem; font-weight: 800;
    cursor: pointer; margin-top: 10px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--green-pale); border-radius: 2px; }
</style>
</head>
<body>

<!-- STATUS PILL -->
<div class="status-pill" id="statusPill">
  <div class="status-dot"></div>
  <span id="statusText">Ready</span>
</div>

<!-- LISTENING OVERLAY -->
<div class="listening-overlay" id="listeningOverlay">
  <div class="listening-icon" id="listeningIcon">🌿</div>
  <div class="wave-container">
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div><div class="wave-bar"></div>
    <div class="wave-bar"></div>
  </div>
  <div class="listening-label">Say your question now</div>
  <button class="cancel-listening" onclick="stopListening(true)">Cancel</button>
</div>

<!-- ══ SCREEN 1: TILE GRID ══ -->
<div class="screen active" id="screen-grid">
  <div class="grid-header">
    <div class="tower-icon">🌿</div>
    <h1>Plant Tower</h1>
    <p>Tap your picture to begin</p>
  </div>
  <div class="tile-grid" id="tileGrid"></div>
</div>

<!-- ══ SCREEN 2: CHAT ══ -->
<div class="screen" id="screen-chat">
  <div class="chat-header">
    <button class="back-btn" onclick="goBack()">←</button>
    <div class="chat-icon-display" id="headerIcon"></div>
    <div class="chat-header-text">
      <div class="chat-header-title">At the plant tower</div>
      <div class="chat-header-sub" id="headerSub">Choose a plant below</div>
    </div>
  </div>

  <div class="plant-selector">
    <button class="plant-btn active" onclick="selectPlant('Basil')"     id="btn-Basil">🌿 Basil</button>
    <button class="plant-btn"        onclick="selectPlant('Coriander')" id="btn-Coriander">🌱 Coriander</button>
    <button class="plant-btn"        onclick="selectPlant('Lettuce')"   id="btn-Lettuce">🥬 Lettuce</button>
  </div>

  <div class="messages" id="messages"></div>

  <div class="chat-input-area">
    <button class="mic-btn" id="micBtn" onclick="toggleListening()">
      <span>🎤</span><span id="micLabel">Tap to speak</span>
    </button>
    <div class="input-row">
      <textarea class="text-input" id="textInput" placeholder="Or type here…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// GOOGLE FORM CONFIG
// ══════════════════════════════════════════
const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSe_d0Rs4g6hfQ0h0E3PcRbvQVll_Bc40R3tVDacs8J7dcLxxA/formResponse";
const ENTRY = {
  child:     "entry.981469337",   // icon only — no name
  plant:     "entry.1107131464",
  childSaid: "entry.1548682299",
  companion: "entry.987679459",
  date:      "entry.1137171765"
};

// ══════════════════════════════════════════
// 30 ANONYMOUS TILES — icons only
// Teacher holds private register mapping icon → child
// ══════════════════════════════════════════
const TILES = [
  {id:1,  emoji:"🦋"}, {id:2,  emoji:"🐸"}, {id:3,  emoji:"🌻"},
  {id:4,  emoji:"🦁"}, {id:5,  emoji:"🐝"}, {id:6,  emoji:"🚀"},
  {id:7,  emoji:"🐠"}, {id:8,  emoji:"⭐"}, {id:9,  emoji:"🦄"},
  {id:10, emoji:"🐢"}, {id:11, emoji:"🌈"}, {id:12, emoji:"🦊"},
  {id:13, emoji:"🍓"}, {id:14, emoji:"🐧"}, {id:15, emoji:"🌸"},
  {id:16, emoji:"🦜"}, {id:17, emoji:"🐳"}, {id:18, emoji:"🌙"},
  {id:19, emoji:"🎈"}, {id:20, emoji:"🐻"}, {id:21, emoji:"🌺"},
  {id:22, emoji:"🐦"}, {id:23, emoji:"⚡"}, {id:24, emoji:"🌴"},
  {id:25, emoji:"💫"}, {id:26, emoji:"🦔"}, {id:27, emoji:"🌼"},
  {id:28, emoji:"🐡"}, {id:29, emoji:"🎸"}, {id:30, emoji:"🌵"}
];

// ── State ──
let currentChild  = null;   // {id, emoji}
let currentPlant  = "Basil";
let conversationHistory = [];
let recognition   = null;
let isListening   = false;
let visitHistory  = {};

// ══════════════════════════════════════════
// VISIT HISTORY  (localStorage — keyed by icon id)
// ══════════════════════════════════════════
function loadHistory() {
  try {
    const s = localStorage.getItem('plantTowerHistory_v2');
    if (s) visitHistory = JSON.parse(s);
  } catch(e) { visitHistory = {}; }
}

function saveHistoryEntry(childId, entry) {
  if (!visitHistory[childId]) visitHistory[childId] = [];
  visitHistory[childId].push(entry);
  if (visitHistory[childId].length > 10)
    visitHistory[childId] = visitHistory[childId].slice(-10);
  try { localStorage.setItem('plantTowerHistory_v2', JSON.stringify(visitHistory)); } catch(e) {}
}

function getLastVisit(childId) {
  const h = visitHistory[childId];
  return (h && h.length > 0) ? h[h.length - 1] : null;
}

// ══════════════════════════════════════════
// BUILD TILE GRID
// ══════════════════════════════════════════
function buildGrid() {
  loadHistory();
  const grid = document.getElementById('tileGrid');
  grid.innerHTML = '';
  TILES.forEach(tile => {
    const hasHist = !!(visitHistory[tile.id] && visitHistory[tile.id].length > 0);
    const div = document.createElement('div');
    div.className = 'tile' + (hasHist ? ' has-history' : '');
    div.innerHTML = `<span class="tile-emoji">${tile.emoji}</span>`;
    div.setAttribute('aria-label', `Icon ${tile.emoji}`);
    div.onclick = () => selectChild(tile);
    grid.appendChild(div);
  });
}

// ══════════════════════════════════════════
// SELECT CHILD → OPEN CHAT
// ══════════════════════════════════════════
function selectChild(tile) {
  currentChild = tile;
  currentPlant = "Basil";
  conversationHistory = [];

  document.getElementById('headerIcon').textContent = tile.emoji;
  document.getElementById('listeningIcon').textContent = tile.emoji;

  // reset plant buttons
  ['Basil','Coriander','Lettuce'].forEach(p =>
    document.getElementById('btn-'+p).classList.toggle('active', p === 'Basil')
  );
  document.getElementById('headerSub').textContent = 'Exploring Basil';

  showScreen('screen-chat');
  document.getElementById('messages').innerHTML = '';

  // show last visit note if exists
  const last = getLastVisit(tile.id);
  if (last) {
    addMessage('history-note',
      `Last time here: exploring ${last.plant} on ${last.date}`);
  }

  // greeting
  const greeting = last
    ? `Hello. Last time you were exploring ${last.plant}. Do you want to go back to it — or shall we try something different today?`
    : `Hello. Welcome to the plant tower. Can you see the three plants growing in there? Go really close. Which one do you want to find out about first?`;

  setTimeout(() => {
    showTyping().then(() => addCompanionMessage(greeting));
  }, 400);
}

// ══════════════════════════════════════════
// PLANT SELECTOR
// ══════════════════════════════════════════
function selectPlant(plant) {
  currentPlant = plant;
  ['Basil','Coriander','Lettuce'].forEach(p =>
    document.getElementById('btn-'+p).classList.toggle('active', p === plant)
  );
  document.getElementById('headerSub').textContent = 'Exploring ' + plant;
}

// ══════════════════════════════════════════
// MESSAGES
// ══════════════════════════════════════════
function addMessage(type, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (type === 'companion') {
    div.innerHTML = `<div class="msg-label">🌿 Plant Companion</div>${escapeHtml(text)}`;
  } else {
    div.textContent = text;
  }
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addCompanionMessage(text) { return addMessage('companion', text); }

function showTyping() {
  return new Promise(resolve => {
    const msgs = document.getElementById('messages');
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<span></span><span></span><span></span>';
    msgs.appendChild(ind);
    msgs.scrollTop = msgs.scrollHeight;
    setTimeout(() => { ind.remove(); resolve(); }, 1100 + Math.random() * 700);
  });
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || !currentChild) return;

  input.value = '';
  autoResize(input);
  addMessage('child', text);
  conversationHistory.push({ role: "user", content: text });

  await showTyping();

  const reply = await callClaude(text);
  addCompanionMessage(reply);
  conversationHistory.push({ role: "assistant", content: reply });

  // save visit history (icon only)
  saveHistoryEntry(currentChild.id, {
    date:  new Date().toLocaleDateString('en-GB'),
    plant: currentPlant,
    summary: `${currentPlant} — "${text.slice(0,60)}${text.length>60?'…':''}"`
  });

  submitToForm(text, reply);
}

// ══════════════════════════════════════════
// CLAUDE API
// ══════════════════════════════════════════
async function callClaude(userMessage) {
  const systemPrompt = `You are a mini manual unit plant companion. You work with 4–5 year old children, their teachers and parents in East London. Children are growing plants in a hydroponic tower called a mini manual unit. You help them explore basil, coriander and lettuce.

Your knowledge covers: pH, light, temperature, where each plant is grown in the world, how kitchens around the world use it, what it smells and tastes like, a description of the plant parts.

Your one job: help children explore the plant using their senses and prior knowledge.

The plant being discussed right now: ${currentPlant}

EYFS MODE — always use this:
- No more than three sentences before you ask something back.
- Every response starts with a sensory instruction: touch it, smell it, look closely, listen to the word. Vary this every response.
- Offer two-option questions before open ones. Example: "Does it smell more like sweets or more like dinner?" Vary the question every time.
- Introduce one new word per response, said slowly with a rhyme, a sound, or a food hook.
- End every response with one small physical thing the child can do at the tower.
- Write for an adult to read aloud: short sentences, natural pauses, good rhythm.

Rules you never break:
1. Never ask for any personal or identifying information.
2. If a child volunteers a country or family origin, accept it gracefully. Do not press.
3. Never give recipes involving raw eggs, raw meat, or alcohol without a clear adult supervision note.
4. Never make medical claims about plants.
5. Never exceed three sentences before asking something back.

Tone: Warm. Curious. Specific. Not a teacher. Not a parent. A companion who knows herbs.
Use sentence case. No exclamation marks. No emoji.`;

  try {
    setStatus('saving', 'Thinking…');
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: conversationHistory
      })
    });
    const data = await res.json();
    setStatus('saved', 'Saved');
    setTimeout(() => setStatus('ready', 'Ready'), 2500);
    const block = data.content && data.content.find(b => b.type === 'text');
    return block ? block.text : "Hmm, I need a moment. Can you try that again?";
  } catch(e) {
    setStatus('error', 'Error');
    return "Something went wrong. Let's try that again.";
  }
}

function submitToForm(childSaid, companionReply) {
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const params = new URLSearchParams({
    [ENTRY.child]:     currentChild.emoji,          // icon only
    [ENTRY.plant]:     currentPlant,
    [ENTRY.childSaid]: childSaid,
    [ENTRY.companion]: companionReply.slice(0, 500),
    [ENTRY.date]:      dateStr
  });

  const iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = `${FORM_ACTION}?${params.toString()}`;
  document.body.appendChild(iframe);
  setTimeout(() => iframe.remove(), 5000);
}

// SPEECH RECOGNITION
// ══════════════════════════════════════════
function toggleListening() {
  if (isListening) { stopListening(true); return; }
  startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Speech input isn't available here. Please type your question."); return; }

  recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micLabel').textContent = 'Listening… tap to stop';
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('listeningOverlay').classList.add('active');
  };

  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    stopListening(false);
    document.getElementById('textInput').value = transcript;
    sendMessage();
  };

  recognition.onerror = () => stopListening(true);
  recognition.onend   = () => { if (isListening) stopListening(true); };
  recognition.start();
}

function stopListening(cancel) {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e){} }
  document.getElementById('micLabel').textContent = 'Tap to speak';
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('listeningOverlay').classList.remove('active');
}

// UI HELPERS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goBack() { showScreen('screen-grid'); buildGrid(); }

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function setStatus(state, text) {
  document.getElementById('statusPill').className = 'status-pill ' + state;
  document.getElementById('statusText').textContent = text;
}
